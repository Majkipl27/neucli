meta:
  name: Acme Corp
  description: Building the future of web development
  lang: en

dependencies:
  "lucide-react": "^0.300.0"

theme:
  colors:
    primary: "#6366f1"
    secondary: "#ec4899"
    accent: "#f59e0b"
  fonts:
    heading: Inter
    body: Inter

components:
  custom-counter:
    tag: div
    imports:
      - "import { useState } from 'react';"
      - "import { Activity } from 'lucide-react';"
    logic: |
      const [count, setCount] = useState(0);
      const increment = () => setCount((c) => c + 1);
    children:
      - type: text
        className: text-2xl font-bold
        props:
          content: "Count is currently: {count}"
      - type: button
        className: bg-indigo-600 text-white font-semibold rounded-lg px-8 py-3 hover:bg-indigo-700 transition-colors
        props:
          label: Add 1
          onClick: "{increment}"

globals:
  navbar:
    type: navbar
    className: bg-white shadow-sm
    props:
      brand: Acme
      links:
        - label: Features
          href: "#features"
        - label: About
          href: "#about"
        - label: Contact
          href: "#contact"

  footer:
    type: footer
    className: bg-gray-900 text-white
    props:
      text: "© 2026 Acme Corp. All rights reserved."
      links:
        - label: Privacy
          href: "#"
        - label: Terms
          href: "#"

pages:
  - path: /
    name: Home
    title: Acme Corp — Building the Future
    meta:
      description: Acme Corp helps you build beautiful websites faster.
    sections:
      - type: hero
        className: bg-gradient-to-br from-indigo-600 to-purple-700 text-white min-h-[60vh] flex items-center
        props:
          title: Build Beautiful Websites
          subtitle: From config to production-ready React code in seconds.
        children:
          - type: button
            props:
              label: Get Started
              href: "#features"
            className: bg-white text-indigo-600 font-semibold rounded-lg px-8 py-3 hover:bg-gray-100 transition-colors
          - type: button
            props:
              label: Learn More
              href: "/about"
            className: border-2 border-white text-white font-semibold rounded-lg px-8 py-3 hover:bg-white/10 transition-colors

      - type: section
        id: features
        className: bg-white
        props:
          title: Features
        children:
          - type: grid
            props:
              columns: 3
            className: mt-4
            children:
              - type: card
                className: bg-gray-50 border border-gray-200
                props:
                  title: Lightning Fast
                  description: Generate complete React projects in seconds, not hours.
              - type: card
                className: bg-gray-50 border border-gray-200
                props:
                  title: Fully Customizable
                  description: Tailwind CSS classes give you complete control over every pixel.
              - type: card
                className: bg-gray-50 border border-gray-200
                props:
                  title: Production Ready
                  description: Clean, typed, well-structured code you can ship with confidence.

      - type: section
        id: about
        className: bg-gray-50
        props:
          title: About Us
        children:
          - type: text
            props:
              content: We believe developers should own their code. No vendor lock-in, no black boxes — just clean React components generated from a simple YAML config.
            className: text-lg text-gray-600 max-w-3xl
          - type: button
            props:
              label: Learn More
              href: "/about"
            className: border-2 border-orange-400 text-orange-400 font-semibold rounded-lg px-8 py-3 hover:bg-orange-400/10 transition-colors

      - type: section
        id: contact
        className: bg-gradient-to-tr from-orange-400 to-red-500 text-white
        props:
          title: Contact Us
        children:
          - type: form
            className: bg-white text-gray-900 p-8 rounded-lg shadow-lg flex flex-col gap-4 *:w-full
            children:
              - type: input
                tag: input
                props:
                  name: name
                  label: Name
                  placeholder: "Enter your name"
              - type: input
                tag: input
                props:
                  name: email
                  label: Email
                  placeholder: "Enter your email"
              - type: textarea
                tag: textarea
                props:
                  name: message
                  label: Message
                  placeholder: "Enter your message"
              - type: button
                props:
                  label: Send Message
                  className: bg-orange-500 text-white font-semibold rounded-lg px-8 py-3 hover:bg-orange-600 ml-auto transition-colors
  - path: /about
    name: About
    title: About — Acme Corp
    sections:
      - type: section
        className: py-24 min-h-[60vh] flex items-center justify-center
        props:
          title: This is the About Page
        children:
          - type: custom-counter
            className: flex flex-col items-center gap-4 bg-white p-8 rounded-xl shadow-lg text-gray-800
          - type: button
            className: bg-indigo-600 text-white font-semibold rounded-lg px-8 py-3 hover:bg-indigo-700 transition-colors mt-8
            props:
              label: Back to Home
              href: "/"
